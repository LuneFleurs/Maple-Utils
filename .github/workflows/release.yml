name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows EXE
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run tauri:build

      - name: Prepare release asset
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          if (-not $version) {
            $version = "manual"
          }

          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item `
            -LiteralPath "src-tauri/target/release/maple-utils.exe" `
            -Destination "release/Maple-Utils-$version.exe" `
            -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Maple-Utils-Windows
          path: release/*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $asset = "release/Maple-Utils-$tag.exe"
          $notesPath = "release/notes-$tag.md"

          $notes = @"
          ## 변경 사항

          - Chrome 차단이 작동되지 않던 현상 수정

          ## 주의 사항

          - 이 기능은 게임 메모리를 읽거나 쓰지 않지만, Windows 창 포커스와 창 스타일을 조정합니다.
          - 설정을 마친 뒤 설정 모드를 꺼야 포커스 유지가 동작합니다.
          "@
          $notes | Set-Content -Path $notesPath -Encoding UTF8

          if (gh release view $tag *> $null) {
            gh release edit $tag `
              --title "Maple Utils $tag" `
              --notes-file $notesPath
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset `
              --title "Maple Utils $tag" `
              --notes-file $notesPath
          }
